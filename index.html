<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glock 'D' Ghoost</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #16213e;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #8a2be2;
            font-size: clamp(14px, 3vw, 20px);
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.8), 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
            pointer-events: none;
        }
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: none;
            z-index: 10;
            pointer-events: none;
        }
        #mobileControls.active {
            display: block;
        }
        .joystick-container {
            position: relative;
            width: 90px;
            height: 90px;
            pointer-events: auto;
        }
        .joystick-base {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(138, 43, 226, 0.3);
            border: 3px solid #8a2be2;
        }
        .joystick-stick {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(138, 43, 226, 0.7);
            border: 3px solid #8a2be2;
            top: 22.5px;
            left: 22.5px;
            transition: all 0.1s;
        }
        @media (max-width: 768px), (pointer: coarse) {
            #mobileControls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span> | Lives: <span id="lives">3</span> | Level: <span id="level">1</span></div>
    <canvas id="gameCanvas"></canvas>
    <div id="mobileControls">
        <div class="joystick-container">
            <div class="joystick-base"></div>
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where, updateDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        
        // Firebase configuration
        // Replace these values with your own from Firebase Console > Project Settings
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Make Firebase available globally
        window.firebaseDB = db;
        window.firebaseModules = {
            collection,
            addDoc,
            getDocs,
            query,
            orderBy,
            limit,
            where,
            updateDoc,
            doc
        };
        
        // Signal that Firebase is ready
        window.firebaseReady = true;
        console.log('Firebase initialized successfully');
    </script>
    
    <script src="main.js"></script>
</body>
</html>
